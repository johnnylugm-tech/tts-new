      - test_fr_02_coverage_supplement
  FR-03:
    unit:
      - test_fr_03_text_splitter
      - test_fr_03_text_splitter_edge_cases
  FR-04:
    unit:
      - test_fr_04_synthesis_concat
  FR-05:
    unit:
      - test_fr_05_circuit_breaker
  FR-06:
    unit:
      - test_fr_06_redis_cache
  FR-07:
    unit:
      - test_fr_07_cli
  FR-08:
    unit:
      - test_fr_08_audio_converter

cross_cutting: {}
