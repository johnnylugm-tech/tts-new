# Harness Quality Gate — CI workflow template
# Auto-generated by harness-init.sh or init-project; or copy manually to .github/workflows/
# Kept in sync with INTEGRATION.md §4 Option A.
#
# Push directly to main — no PR required.
# Blocking is via local pre-push hook (harness/scripts/harness-init.sh) + this CI gate.
# If CI fails after push, fix and push again; CI re-evaluates on the next push.
#
# No CURRENT_PHASE variable needed — phase is auto-detected from .methodology/state.json.
name: Harness Quality Gate

on:
  push:
    branches: [main]

jobs:
  gate-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0  # Full history required for phase boundary commit verification

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install harness dependencies
        run: |
          # pyyaml required for gate score variance check
          pip install -r harness/requirements.txt || true
          pip install pyyaml 2>/dev/null || true

      - name: Auto-detect phase from state.json
        id: phase
        run: |
          # Read phase from project's own state.json — the single source of truth.
          # Local hooks, CLI commands, and CI all read .methodology/state.json::current_phase.
          PHASE=$(python3 -c "
          import json, sys
          try:
              d = json.load(open('.methodology/state.json'))
              print(d.get('current_phase', d.get('phase', 1)))
          except Exception:
              print(1)
          " 2>/dev/null || echo "1")
          echo "PHASE=$PHASE" >> $GITHUB_OUTPUT
          echo "Detected phase: $PHASE (from .methodology/state.json)"

      - name: Run Phase Preflight (FSM / drift / constitution)
        # Structural enforcement only (FSM state, constitution, drift, traceability).
        # Gate score evaluation requires an interactive Claude session — always local.
        # Gate 4 (P6 exit) — Hermes APPROVE removed in v2.4; CI-friendly.
        # G-02 fix: P6 no longer skipped — run-phase --phase 6 is safe in CI (no interactive gate eval).
        env:
          PHASE: ${{ steps.phase.outputs.PHASE }}
        run: python harness/harness_cli.py run-phase --phase $PHASE --project .

      - name: Gate Score Variance Check
        # Detects fabricated gate scores: if all per-FR Gate1 scores in the phase are
        # identical, they were likely copied rather than evaluated per FR.
        # Only checks entries where fr_id is non-null (per-FR scores); aggregate Gate2/Gate4
        # scores (fr_id=null) are excluded so one different aggregate score can't mask fraud.
        env:
          PHASE: ${{ steps.phase.outputs.PHASE }}
        run: |
          python3 - <<'EOF'
          import glob, sys, os
          try:
              import yaml
          except ImportError:
              print("pyyaml not available — skipping variance check")
              sys.exit(0)
          phase = int(os.environ.get("PHASE", "1"))
          logs = glob.glob(f".methodology/decision_logs/**/GATE_{phase}_*.yaml", recursive=True)
          scores = []
          for lf in logs:
              try:
                  d = yaml.safe_load(open(lf))
                  if (d or {}).get("ctx", {}).get("fr_id") is None:
                      continue  # skip aggregate (Gate2/Gate4) entries
                  s = (d or {}).get("scores", {}).get("gate_score")
                  if s is not None:
                      scores.append(float(s))
              except Exception:
                  pass
          if len(scores) > 2 and len(set(scores)) == 1:
              print(f"FAIL: All {len(scores)} per-FR gate scores identical ({scores[0]}) for phase {phase}.")
              print("      Scores must vary per FR — identical scores indicate fabrication.")
              sys.exit(1)
          print(f"OK: Gate score variance check passed ({len(scores)} per-FR entries for phase {phase}).")
          EOF

  push-milestone-enforcement:
    name: Enforce push-milestone (no --no-verify bypass)
    runs-on: ubuntu-latest
    # Only enforce on pushes to main — PRs may legitimately lack state.json
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Check last_milestone_command in state.json
        run: |
          STATE_FILE=".methodology/state.json"
          if [ ! -f "$STATE_FILE" ]; then
            echo "INFO: No state.json found — project not yet initialized, skipping."
            exit 0
          fi
          # CV-5: safe JSON parsing — corrupt/empty state.json defaults to 0
          # so CI emits a clear error instead of dying with a Python traceback.
          PHASE=$(python3 -c "
          import json, sys
          try:
              d = json.load(open('$STATE_FILE'))
              print(d.get('current_phase', 0))
          except Exception as e:
              print(f'[WARN] state.json unreadable: {e}', file=sys.stderr)
              print(0)
          ")
          if [ "$PHASE" -lt 3 ]; then
            echo "INFO: Phase $PHASE < 3 — push-milestone not yet required."
            exit 0
          fi
          CMD=$(python3 -c "
          import json, sys
          try:
              d = json.load(open('$STATE_FILE'))
              print(d.get('last_milestone_command', ''))
          except Exception as e:
              print(f'[WARN] state.json unreadable: {e}', file=sys.stderr)
              print('')
          ")
          if [ -z "$CMD" ]; then
            echo "ERROR: state.json has no last_milestone_command field."
            echo "Direct git push detected. Use instead:"
            echo "  python harness/harness_cli.py push-milestone --type <type> --project ."
            exit 1
          fi
          echo "OK: last_milestone_command = $CMD"

      - name: Verify HANDOVER.md exists (P3+)
        # G-NEW-6 fix: push-milestone generates HANDOVER.md; CI verifies it exists for P3+.
        # P1/P2 HANDOVER.md is already checked by p1p2-enforcement job.
        run: |
          PHASE=$(python3 -c "
          import json, sys
          try:
              d = json.load(open('.methodology/state.json', encoding='utf-8'))
              print(int(d.get('current_phase', 0)))
          except Exception:
              print(0)
          " 2>/dev/null || echo "0")
          if [ "$PHASE" -lt 3 ]; then
            echo "INFO: Phase $PHASE < 3 — HANDOVER.md managed by p1p2-enforcement."
            exit 0
          fi
          if [ ! -f "HANDOVER.md" ]; then
            echo "ERROR: HANDOVER.md missing for Phase $PHASE."
            echo "push-milestone should have generated HANDOVER.md."
            echo "Run: python harness/harness_cli.py push-milestone --type <type> --project ."
            exit 1
          fi
          echo "OK: HANDOVER.md present."



  p8-archive-check:
    name: P8 Archive & HANDOVER Validation
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Detect if P8 milestone was pushed
        id: p8
        run: |
          STATE_FILE=".methodology/state.json"
          IS_P8="false"
          if [ -f "$STATE_FILE" ]; then
            # CV-5: safe parse — corrupt state.json defaults to empty string.
            CMD=$(python3 -c "
          import json, sys
          try:
              d = json.load(open('$STATE_FILE'))
              print(d.get('last_milestone_command', ''))
          except Exception as e:
              print(f'[WARN] state.json unreadable: {e}', file=sys.stderr)
              print('')
          ")
            if echo "$CMD" | grep -q "p8"; then
              IS_P8="true"
            fi
          fi
          echo "IS_P8=$IS_P8" >> $GITHUB_OUTPUT

      - name: Validate .methodology-archive exists (P8 only)
        if: steps.p8.outputs.IS_P8 == 'true'
        run: |
          if [ ! -d ".methodology-archive" ]; then
            echo "ERROR: .methodology-archive/ does not exist."
            echo "Archive all phase artifacts before P8 push."
            exit 1
          fi
          echo "OK: .methodology-archive/ exists."

      - name: Validate HANDOVER.md has no Phase 9 references (P8 only)
        if: steps.p8.outputs.IS_P8 == 'true'
        run: |
          if [ -f "HANDOVER.md" ]; then
            if grep -qi "phase 9\|phase9\|phase9_plan" HANDOVER.md; then
              echo "ERROR: HANDOVER.md references non-existent Phase 9."
              grep -ni "phase 9\|phase9" HANDOVER.md || true
              exit 1
            fi
            echo "OK: HANDOVER.md has no Phase 9 references."
          fi

      - name: Validate P8 deliverables exist (P8 only)
        # G-NEW-3 fix: P8 is the last phase — no P9 entry check exists.
        # Verify P8's own artifacts at push time instead.
        if: steps.p8.outputs.IS_P8 == 'true'
        run: |
          MISSING=""
          for f in "08-config/CONFIG_RECORDS.md" "08-config/RELEASE_CHECKLIST.md"; do
            [ -f "$f" ] || MISSING="$MISSING $f"
          done
          if [ -n "$MISSING" ]; then
            echo "ERROR: P8 deliverables missing:$MISSING"
            echo "Complete these before the P8 milestone push:"
            echo "  08-config/CONFIG_RECORDS.md — deployment configuration record"
            echo "  08-config/RELEASE_CHECKLIST.md — release validation checklist"
            exit 1
          fi
          echo "OK: P8 deliverables present."

  d4-spec-coverage-check:
    # v2.6: Unified D4 spec-coverage-check (replaces prior forward+backward dual check).
    name: D4 Spec Coverage Check (unified)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install harness dependencies
        run: pip install -r harness/requirements.txt || true

      - name: Detect phase
        id: phase
        run: |
          PHASE=$(python3 -c "
          import json
          try:
              d = json.load(open('.methodology/state.json'))
              print(int(d.get('current_phase', 0)))
          except Exception:
              print(0)
          " 2>/dev/null || echo "0")
          echo "PHASE=$PHASE" >> $GITHUB_OUTPUT

      - name: D4 spec-coverage-check (unified v2.6)
        env:
          PHASE: ${{ steps.phase.outputs.PHASE }}
        run: |
          # Threshold per phase: P3=60%, P4-P5=80%, P6+=90% (unified v2.6)
          python3 - <<'EOF'
          import os, sys, subprocess
          phase = int(os.environ.get("PHASE", "0"))
          thresholds = {3: 60.0, 4: 80.0, 5: 80.0, 6: 90.0, 7: 90.0, 8: 90.0}
          threshold = thresholds.get(phase, 60.0)
          if phase < 3:
              print(f"INFO: Phase {phase} < 3 — spec-coverage-check not required.")
              sys.exit(0)
          result = subprocess.run(
              [sys.executable, "harness/harness_cli.py", "spec-coverage-check",
               "--project", ".", "--threshold", str(threshold)],
              capture_output=True, text=True
          )
          print(result.stdout)
          if result.returncode != 0:
              print(result.stderr)
              print(f"FAIL: D4 spec-coverage < {threshold:.0f}% for phase {phase}.")
              sys.exit(1)
          print(f"OK: D4 spec-coverage >= {threshold:.0f}%")
          EOF

  sab-validation:
    # G-10 fix: CI validation for SAB.json (previously no CI check existed).
    name: SAB.json Schema Validation
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Detect phase
        id: phase
        run: |
          PHASE=$(python3 -c "
          import json
          try:
              d = json.load(open('.methodology/state.json'))
              print(int(d.get('current_phase', 0)))
          except Exception:
              print(0)
          " 2>/dev/null || echo "0")
          echo "PHASE=$PHASE" >> $GITHUB_OUTPUT

      - name: Validate SAB.json (P3+)
        if: fromJSON(steps.phase.outputs.PHASE) >= 3
        run: |
          python3 - <<'EOF'
          import json, sys
          sab_path = ".methodology/SAB.json"
          try:
              d = json.load(open(sab_path))
          except FileNotFoundError:
              print(f"ERROR: {sab_path} not found.")
              print("Run: python harness/scripts/generate_sab.py --project .")
              sys.exit(1)
          except Exception as e:
              print(f"ERROR: {sab_path} is not valid JSON: {e}")
              sys.exit(1)
          modules = d.get("modules", [])
          layers = d.get("layers", [])
          if not modules and layers:
              for layer in layers:
                  modules.extend(layer.get("modules", []))
          if not modules:
              print(f"ERROR: SAB.json has no modules. Re-run generate_sab.py.")
              sys.exit(1)
          print(f"OK: SAB.json valid — {len(modules)} module(s), {len(layers)} layer(s).")
          EOF

  phase-end-audit-check:
    # G-12 + G-08 fix: CI check that Phase End Audit CRITICAL gaps are cleared before advancing.
    name: Phase End Audit — No CRITICAL Gaps
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Detect phase
        id: phase
        run: |
          PHASE=$(python3 -c "
          import json
          try:
              d = json.load(open('.methodology/state.json'))
              print(int(d.get('current_phase', 0)))
          except Exception:
              print(0)
          " 2>/dev/null || echo "0")
          echo "PHASE=$PHASE" >> $GITHUB_OUTPUT

      - name: Check previous phase audit for CRITICAL gaps (P4+)
        # Phase End Audit is P3+ only. We check phase N-1's audit when in phase N (N>=4).
        # audit_gaps_N.md marks unchecked CRITICAL items as "- [ ]" under "## CRITICAL Gaps".
        if: steps.phase.outputs.PHASE >= 4
        env:
          PHASE: ${{ steps.phase.outputs.PHASE }}
        run: |
          python3 - <<'EOF'
          import os, sys, re
          phase = int(os.environ.get("PHASE", "0"))
          prev = phase - 1
          audit_file = f".methodology/audit_gaps_{prev}.md"
          if not os.path.exists(audit_file):
              print(f"INFO: {audit_file} not found — Phase End Audit may not have run for P{prev}.")
              print(f"      Run: python harness/scripts/phase_end_audit.py --phase {prev} --project .")
              # Non-blocking if file doesn't exist yet (first push after advance-phase).
              sys.exit(0)
          content = open(audit_file, encoding="utf-8").read()
          critical_section = re.search(
              r'## CRITICAL Gaps.*?(?=## |\Z)', content, re.DOTALL | re.IGNORECASE
          )
          if not critical_section:
              print(f"OK: No CRITICAL Gaps section in {audit_file}.")
              sys.exit(0)
          unchecked = re.findall(r'^- \[ \]', critical_section.group(0), re.MULTILINE)
          if unchecked:
              print(f"FAIL: {audit_file} has {len(unchecked)} unchecked CRITICAL gap(s).")
              print("Fix all CRITICAL gaps before advancing to the next phase.")
              print(content)
              sys.exit(1)
          print(f"OK: {audit_file} — no unchecked CRITICAL gaps.")
          EOF

  deliverable-existence-check:
    # G-13 + G-15 fix: CI check for phase deliverables existence (TEST_PLAN, VERIFICATION_REPORT, etc.).
    name: Phase Deliverables Existence Check
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Detect phase
        id: phase
        run: |
          PHASE=$(python3 -c "
          import json
          try:
              d = json.load(open('.methodology/state.json'))
              print(int(d.get('current_phase', 0)))
          except Exception:
              print(0)
          " 2>/dev/null || echo "0")
          echo "PHASE=$PHASE" >> $GITHUB_OUTPUT

      - name: Check phase deliverables exist
        env:
          PHASE: ${{ steps.phase.outputs.PHASE }}
        run: |
          python3 - <<'EOF'
          import os, sys
          phase = int(os.environ.get("PHASE", "0"))
          # Deliverables required to exist when phase >= p.
          # Each entry: "checked when entering phase p or later" (cumulative).
          # Paths authoritative from core/quality_gate/phase_artifact_enforcer.py.
          required = {
              3: ["02-architecture/SAD.md"],                         # G-NEW-1: P2 artifact, present from P3+
              4: ["04-testing/TEST_PLAN.md"],
              5: ["04-testing/TEST_RESULTS.md"],
              6: ["05-verification/VERIFICATION_REPORT.md", "05-verification/BASELINE.md"],
              7: ["06-quality/QUALITY_REPORT.md",                   # P6 artifact
                  "RELEASE_NOTES.md",                               # C-1: P6 artifact (project root)
                  "FINAL_SIGN_OFF.md"],                             # G-NEW-2: P6 artifact
              8: ["07-risk/RISK_STATUS_REPORT.md",                  # C-2: P7 artifact, was missing RISK_REGISTER
                  "07-risk/RISK_REGISTER.md",                       # C-2 fix
                  "07-risk/RISK_MITIGATION_PLANS.md"],              # K-1: generator lists this, now CI-enforced
          }
          missing = []
          for p, files in required.items():
              if phase >= p:
                  for f in files:
                      if not os.path.exists(f):
                          missing.append(f"[Phase {p}+] {f}")
          if missing:
              print("FAIL: Expected deliverables missing:")
              for m in missing:
                  print(f"  {m}")
              sys.exit(1)
          print(f"OK: all expected deliverables present for phase {phase}.")
          EOF

  aspice-trace-check:
    # G-14 fix: CI enforcement of ASPICE traceability (TH-01), previously local-only.
    name: ASPICE Traceability Check (TH-01)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install harness dependencies
        run: pip install -r harness/requirements.txt || true

      - name: Detect phase
        id: phase
        run: |
          PHASE=$(python3 -c "
          import json
          try:
              d = json.load(open('.methodology/state.json'))
              print(int(d.get('current_phase', 0)))
          except Exception:
              print(0)
          " 2>/dev/null || echo "0")
          echo "PHASE=$PHASE" >> $GITHUB_OUTPUT

      - name: Verify trace attestation (PR 3, P3+)
        if: steps.phase.outputs.PHASE >= 3
        # Exit 0/2 are acceptable at P3/P4 (informational / first run);
        # exit 1 (mismatch) and exit 3 (schema error) block the gate at P5+.
        run: |
          python harness/harness_cli.py verify-trace \
            --project . --gate ${{ steps.phase.outputs.PHASE }} \
            || [ $? -eq 2 ]   # exit 2 = missing, OK on first run

      - name: Run ASPICE traceability audit (P4+)
        if: steps.phase.outputs.PHASE >= 4
        run: python harness/harness_cli.py audit-structure --project .

  gate4-tag-check:
    # G-17 fix: CI verification that Gate 4 git tag was pushed (previously local-only manual step).
    name: Gate 4 Git Tag Verification (P7+)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history required for tag lookup

      - name: Detect phase
        id: phase
        run: |
          PHASE=$(python3 -c "
          import json
          try:
              d = json.load(open('.methodology/state.json', encoding='utf-8'))
              print(int(d.get('current_phase', 0)))
          except Exception:
              print(0)
          " 2>/dev/null || echo "0")
          echo "PHASE=$PHASE" >> $GITHUB_OUTPUT

      - name: Verify harness-v4-* tag exists (P7+)
        if: steps.phase.outputs.PHASE >= 7
        run: |
          if git tag | grep -q "^harness-v4-"; then
            echo "OK: harness-v4-* tag found."
            git tag | grep "^harness-v4-"
          else
            echo "ERROR: No harness-v4-* tag found."
            echo "After Gate 4 PASS, tag the commit:"
            echo "  git tag -a 'harness-v4-YYYYMMDD-scoreXX' -m 'Gate 4 PASS'"
            echo "  git push origin --tags"
            exit 1
          fi

  gate-pass-check:
    # G-NEW-5 fix: CI verification of quality_manifest.json gate PASS records.
    # advance-phase locally checks this; CI provides server-side enforcement.
    name: Quality Gate PASS Record Verification
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Detect phase
        id: phase
        run: |
          PHASE=$(python3 -c "
          import json
          try:
              d = json.load(open('.methodology/state.json'))
              print(int(d.get('current_phase', 0)))
          except Exception:
              print(0)
          " 2>/dev/null || echo "0")
          echo "PHASE=$PHASE" >> $GITHUB_OUTPUT

      - name: Verify required gate PASS in quality_manifest.json
        # Entry gate map (mirrors _ENTRY_GATE_MAP in harness_cli.py):
        #   P4 requires Gate 2 PASS, P5/P6 require Gate 3, P7/P8 require Gate 4
        env:
          PHASE: ${{ steps.phase.outputs.PHASE }}
        run: |
          python3 - <<'EOF'
          import json, os, sys
          phase = int(os.environ.get("PHASE", "0"))
          # Gate N is required to be in phase p (from _ENTRY_GATE_MAP in harness_cli.py)
          entry_gate = {4: 2, 5: 3, 6: 3, 7: 4, 8: 4}
          gate_num = entry_gate.get(phase)
          if gate_num is None:
              print(f"INFO: Phase {phase} has no required gate record — skipping.")
              sys.exit(0)
          manifest_path = ".methodology/quality_manifest.json"
          try:
              manifest = json.load(open(manifest_path, encoding='utf-8'))
          except FileNotFoundError:
              print(f"ERROR: {manifest_path} not found.")
              print(f"  Gate {gate_num} PASS is required to be in Phase {phase}.")
              print(f"  Run finalize-gate --gate {gate_num} and advance-phase to generate it.")
              sys.exit(1)
          except Exception as e:
              print(f"ERROR: {manifest_path} is not valid JSON: {e}")
              sys.exit(1)
          gate_result = manifest.get("gate_results", {}).get(f"gate{gate_num}", {})
          if gate_result.get("quality_complete"):
              print(f"OK: Gate {gate_num} PASS confirmed in quality_manifest.json (Phase {phase}).")
              sys.exit(0)
          print(f"FAIL: Gate {gate_num} PASS not recorded in quality_manifest.json for Phase {phase}.")
          print(f"  Expected: gate_results.gate{gate_num}.quality_complete = true")
          print(f"  Got: {gate_result!r}")
          print(f"  Run: python harness/harness_cli.py finalize-gate --gate {gate_num} --phase <prev_phase> --project .")
          sys.exit(1)
          EOF
